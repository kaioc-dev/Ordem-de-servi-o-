<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandas Premium</title>
    <style>
        /* Paleta Premium - Midnight & Amber */
        :root {
            --bg-color: #0b0f19; /* Fundo principal escuro e profundo */
            --card-bg: #151b2b; /* Fundo dos cartões e inputs */
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #2a3441;
            --accent-color: #d97706; /* Âmbar elegante */
            --accent-glow: rgba(217, 119, 6, 0.25);
            --danger-color: #e11d48;
            --success-color: #10b981;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Cabeçalho */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--text-main);
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            margin: 0 0 5px 0;
        }

        h1 span {
            color: var(--accent-color);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }

        /* Grid das Mesas */
        .mesas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
            gap: 15px;
        }

        .mesa-btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px 0;
            font-size: 18px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            position: relative;
        }

        .mesa-btn:active {
            transform: scale(0.95);
        }

        /* Estilo para mesas ocupadas (Comandas Ativas) */
        .mesa-btn.ocupada {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: linear-gradient(145deg, var(--card-bg), #1a1814);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* Indicador visual de cliente na mesa */
        .mesa-btn.ocupada::after {
            content: '';
            position: absolute;
            top: 6px;
            right: 6px;
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 5px var(--accent-color);
        }

        /* Tela de Edição (Modal) */
        #editor-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 100;
            padding: 25px;
            box-sizing: border-box;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        #editor-titulo {
            color: var(--accent-color);
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .fechar-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }

        /* Campos de Entrada */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea {
            width: 100%;
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input::placeholder, textarea::placeholder {
            color: #475569;
        }

        textarea {
            height: 220px;
            resize: none;
            line-height: 1.5;
        }

        /* Botões de Ação */
        .botoes-container {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button.acao {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s, transform 0.1s;
        }

        button.acao:active {
            transform: scale(0.97);
        }

        .btn-salvar { 
            background-color: var(--success-color); 
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
            flex: 2; /* O botão de salvar fica maior que o de excluir */
        }
        
        .btn-limpar { 
            background-color: transparent;
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
        }

    </style>
</head>
<body>

    <header>
        <h1>Anote<span>Bar</span></h1>
        <p class="subtitle">Controle de Comandas</p>
    </header>
    
    <div class="mesas-grid" id="grid-mesas">
        </div>

    <div id="editor-modal">
        <div class="modal-header">
            <h2 id="editor-titulo">Mesa X</h2>
            <button class="fechar-btn" onclick="fecharMesa()">&times;</button>
        </div>
        
        <div class="input-group">
            <label for="cliente-nome">Cliente</label>
            <input type="text" id="cliente-nome" placeholder="Nome ou apelido..." autocomplete="off">
        </div>
        
        <div class="input-group">
            <label for="pedido-notas">Pedidos da Mesa</label>
            <textarea id="pedido-notas" placeholder="2x Cervejas Long Neck&#10;1x Porção de Fritas..."></textarea>
        </div>
        
        <div class="botoes-container">
            <button class="acao btn-limpar" onclick="limparMesa()">Excluir</button>
            <button class="acao btn-salvar" onclick="salvarMesa()">Salvar Pedido</button>
        </div>
    </div>

    <script>
        const totalMesas = 25;
        let mesaAtual = null;
        let pedidosSalvos = JSON.parse(localStorage.getItem('pedidosAnoteBar')) || {};

        function inicializarApp() {
            const grid = document.getElementById('grid-mesas');
            grid.innerHTML = '';

            for (let i = 1; i <= totalMesas; i++) {
                let btn = document.createElement('div');
                btn.className = 'mesa-btn';
                btn.innerText = i;
                
                if (pedidosSalvos[i] && (pedidosSalvos[i].nome || pedidosSalvos[i].notas)) {
                    btn.classList.add('ocupada');
                }

                btn.onclick = () => abrirMesa(i);
                grid.appendChild(btn);
            }
        }

        function abrirMesa(numeroMesa) {
            mesaAtual = numeroMesa;
            document.getElementById('editor-titulo').innerText = 'Mesa ' + numeroMesa;
            
            const dados = pedidosSalvos[numeroMesa] || { nome: '', notas: '' };
            document.getElementById('cliente-nome').value = dados.nome;
            document.getElementById('pedido-notas').value = dados.notas;

            document.getElementById('editor-modal').style.display = 'block';
        }

        function salvarMesa() {
            const nome = document.getElementById('cliente-nome').value.trim();
            const notas = document.getElementById('pedido-notas').value.trim();

            if (nome === '' && notas === '') {
                delete pedidosSalvos[mesaAtual];
            } else {
                pedidosSalvos[mesaAtual] = { nome: nome, notas: notas };
            }

            localStorage.setItem('pedidosLoungeBar', JSON.stringify(pedidosSalvos));
            fecharMesa();
            inicializarApp(); 
        }

        function limparMesa() {
            // Só pede confirmação se a mesa realmente tiver algo salvo
            if (pedidosSalvos[mesaAtual]) {
                if (confirm('Deseja excluir a comanda da Mesa ' + mesaAtual + '?')) {
                    delete pedidosSalvos[mesaAtual];
                    localStorage.setItem('pedidosLoungeBar', JSON.stringify(pedidosSalvos));
                    fecharMesa();
                    inicializarApp();
                }
            } else {
                fecharMesa();
            }
        }

        function fecharMesa() {
            document.getElementById('editor-modal').style.display = 'none';
            mesaAtual = null;
        }

        inicializarApp();
    </script>
</body>
</html>
