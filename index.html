<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Bar</title>
    <style>
        /* Paleta de Cores Tema Escuro */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333333;
            --accent-color: #ff9800; /* Laranja estilo bar */
            --danger-color: #f44336;
            --success-color: #4caf50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* Grid das 25 Mesas */
        .mesas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 12px;
        }

        .mesa-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 0;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Estilo para mesas que já têm pedidos anotados */
        .mesa-btn.ocupada {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background-color: #2a1f10;
        }

        /* Tela de Edição (Modal) */
        #editor-modal {
            display: none; /* Escondido por padrão */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        #editor-titulo {
            color: var(--accent-color);
            margin-top: 0;
            font-size: 22px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #aaa;
        }

        input, textarea {
            width: 100%;
            background-color: var(--card-bg);
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        textarea {
            height: 200px;
            resize: none;
        }

        /* Botões do Editor */
        .botoes-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button.acao {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .btn-salvar { background-color: var(--success-color); }
        .btn-limpar { background-color: var(--danger-color); }
        .btn-voltar { background-color: #555; }
    </style>
</head>
<body>

    <h1>Comandas - Bar</h1>
    
    <div class="mesas-grid" id="grid-mesas">
        </div>

    <div id="editor-modal">
        <h2 id="editor-titulo">Mesa X</h2>
        
        <label for="cliente-nome">Nome do Cliente:</label>
        <input type="text" id="cliente-nome" placeholder="Ex: João Silva">
        
        <label for="pedido-notas">Pedidos da Mesa:</label>
        <textarea id="pedido-notas" placeholder="Anote as bebidas e porções aqui..."></textarea>
        
        <div class="botoes-container">
            <button class="acao btn-voltar" onclick="fecharMesa()">Voltar</button>
            <button class="acao btn-limpar" onclick="limparMesa()">Excluir Nota</button>
            <button class="acao btn-salvar" onclick="salvarMesa()">Salvar</button>
        </div>
    </div>

    <script>
        const totalMesas = 25;
        let mesaAtual = null;
        
        // Recupera os dados salvos no navegador (se houver)
        let pedidosSalvos = JSON.parse(localStorage.getItem('pedidosBar')) || {};

        // Inicializa a tela com os botões das mesas
        function inicializarApp() {
            const grid = document.getElementById('grid-mesas');
            grid.innerHTML = '';

            for (let i = 1; i <= totalMesas; i++) {
                let btn = document.createElement('div');
                btn.className = 'mesa-btn';
                btn.innerText = i;
                
                // Se a mesa tem dados salvos (nome ou notas), marca visualmente como "ocupada"
                if (pedidosSalvos[i] && (pedidosSalvos[i].nome || pedidosSalvos[i].notas)) {
                    btn.classList.add('ocupada');
                }

                btn.onclick = () => abrirMesa(i);
                grid.appendChild(btn);
            }
        }

        // Abre o bloco de notas de uma mesa específica
        function abrirMesa(numeroMesa) {
            mesaAtual = numeroMesa;
            document.getElementById('editor-titulo').innerText = 'Mesa ' + numeroMesa;
            
            // Carrega os dados se existirem, ou deixa em branco
            const dados = pedidosSalvos[numeroMesa] || { nome: '', notas: '' };
            document.getElementById('cliente-nome').value = dados.nome;
            document.getElementById('pedido-notas').value = dados.notas;

            // Mostra o modal escondendo a página principal
            document.getElementById('editor-modal').style.display = 'block';
        }

        // Salva os dados digitados e fecha a nota
        function salvarMesa() {
            const nome = document.getElementById('cliente-nome').value.trim();
            const notas = document.getElementById('pedido-notas').value.trim();

            if (nome === '' && notas === '') {
                // Se tudo estiver vazio, funciona como limpar
                delete pedidosSalvos[mesaAtual];
            } else {
                pedidosSalvos[mesaAtual] = { nome: nome, notas: notas };
            }

            // Salva no armazenamento do celular
            localStorage.setItem('pedidosBar', JSON.stringify(pedidosSalvos));
            
            fecharMesa();
            inicializarApp(); // Atualiza a cor dos botões na tela principal
        }

        // Exclui completamente a nota da mesa atual
        function limparMesa() {
            if (confirm('Tem certeza que deseja excluir toda a nota da Mesa ' + mesaAtual + '?')) {
                delete pedidosSalvos[mesaAtual];
                localStorage.setItem('pedidosBar', JSON.stringify(pedidosSalvos));
                fecharMesa();
                inicializarApp();
            }
        }

        // Fecha a área de anotação
        function fecharMesa() {
            document.getElementById('editor-modal').style.display = 'none';
            mesaAtual = null;
        }

        // Inicia o aplicativo ao carregar
        inicializarApp();
    </script>
</body>
</html>
